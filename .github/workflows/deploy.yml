name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # base-href must match the project-page path: https://<user>.github.io/volt/
      - run: npx ng build --base-href=/volt/
      # SPA fallback so deep links (e.g. /volt/ajustes) don't 404 on Pages
      - run: cp dist/volt/browser/index.html dist/volt/browser/404.html
      - run: touch dist/volt/browser/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/volt/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
